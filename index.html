    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 20px;
            margin-bottom: 15px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        h3 {
            color: #555;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .input-row input,
        .input-row select {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .input-row input:focus,
        .input-row select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #48bb78;
            color: white;
            width: 100%;
        }
        
        .btn-success:hover {
            background: #38a169;
        }
        
        .btn-danger {
            background: #f56565;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
        }
        
        .btn-danger:hover {
            background: #e53e3e;
        }
        
        .btn-small {
            padding: 8px 12px;
            font-size: 14px;
        }
        
        .room-card {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
        }
        
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .room-number {
            font-size: 20px;
            font-weight: bold;
            color: #2d3748;
        }
        
        .guest-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .diamond { background: #e6f3ff; color: #0066cc; }
        .platinum { background: #f0e6ff; color: #6b46c1; }
        .gold { background: #fffbeb; color: #d97706; }
        .silver { background: #f7fafc; color: #718096; }
        .club { background: #d1fae5; color: #047857; }
        .booking { background: #ffebeb; color: #c53030; }
        .expedia { background: #fff5e6; color: #c05621; }
        .direct { background: #e6f7ff; color: #0c4a6e; }
        .arrival { background: #fef9c3; color: #854d0e; }
        .not-reserved { background: #f3f4f6; color: #374151; }

        .tick-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2.5px solid #cbd5e0;
            background: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            color: #cbd5e0;
        }

        .tick-btn:hover {
            border-color: #48bb78;
            color: #48bb78;
        }

        .tick-btn.ticked {
            background: #48bb78;
            border-color: #48bb78;
            color: white;
        }

        .room-card.ticked-card {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .room-card.dirty-card {
            border-color: #f56565;
            background: #fff5f5;
        }

        .room-card.clean-card {
            border-color: #ed8936;
            background: #fffaf0;
        }

        .photo-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px solid #e2e8f0;
        }

        .photo-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .photo-thumb-wrap {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            flex-shrink: 0;
        }

        .photo-thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-thumb-del {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .photo-thumb-save {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(72,187,120,0.85);
            color: white;
            border: none;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .btn-camera {
            background: #4a5568;
            color: white;
            padding: 8px 14px;
            font-size: 13px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .btn-camera:hover {
            background: #2d3748;
        }

        .btn-wa-photo {
            background: #25d366;
            color: white;
            padding: 8px 14px;
            font-size: 13px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .btn-wa-photo:hover {
            background: #1ebe5d;
        }
        
        .status-section {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .status-header {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .room-list-item {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .room-list-item:last-child {
            border-bottom: none;
        }
        
        .observation-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px solid #e2e8f0;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .quick-observations {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .quick-obs-btn {
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-obs-btn:hover {
            border-color: #667eea;
            background: #f7fafc;
        }
        
        .quick-obs-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .inspector-select {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        
        .inspector-btn {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .inspector-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .preview-box {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .section-divider {
            height: 2px;
            background: linear-gradient(to right, transparent, #e2e8f0, transparent);
            margin: 30px 0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .room-card {
            animation: slideIn 0.3s ease-out;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #718096;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🏨 Room Inspection Manager</h1>
            
            <!-- STEP 1: Add Rooms -->
            <h2>📋 Priority Room List</h2>
            <div id="roomsCounter" style="display:none;margin-bottom:12px;padding:10px 14px;background:#eef2ff;border-radius:10px;font-size:14px;font-weight:600;color:#4c51bf;"></div>
            <div class="input-row">
                <input type="text" id="roomNumber" placeholder="Room #" inputmode="numeric">
                <select id="guestType">
                    <option value="diamond">Diamond Elite</option>
                    <option value="platinum">Platinum Elite</option>
                    <option value="gold">Gold Elite</option>
                    <option value="silver">Silver Elite</option>
                    <option value="club">Club Member</option>
                    <option value="booking">Booking.com</option>
                    <option value="expedia">Expedia</option>
                    <option value="direct">Direct Booking</option>
                    <option value="arrival">Arrival</option>
                    <option value="not-reserved">Not Reserved</option>
                </select>
                <select id="roomStatus">
                    <option value="dirty">Dirty</option>
                    <option value="inspected">Inspected</option>
                    <option value="clean">Clean</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="addRoom()">+ Add Room</button>
            
            <div style="margin-top: 20px;" id="roomsList"></div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-success" onclick="copyPriorityList()" style="flex: 1;">
                    📱 Copy Priority List for WhatsApp
                </button>
                <button class="btn" onclick="removeAllRooms()" style="background: #f56565; color: white; padding: 12px 20px;">
                    🗑️ Remove All
                </button>
            </div>
            
            <div style="margin-top: 15px;">
                <h3>Preview:</h3>
                <div class="preview-box" id="priorityPreview"></div>
            </div>
            
            <div class="section-divider"></div>
            
            <!-- STEP 2: Inspection Report -->
            <h2>✅ Inspection Report</h2>
            
            <button class="btn btn-success" onclick="copyInspectionReport()" style="margin-top: 5px;">
                📱 Copy Inspection Report for WhatsApp
            </button>
            
            <div style="margin-top: 15px;">
                <h3>Preview:</h3>
                <div class="preview-box" id="inspectionPreview"></div>
            </div>
        </div>
    </div>

    <script>
        var rooms = [];
        
        // Guest type display names
        var guestTypeNames = {
            'diamond': 'Diamond Elite',
            'platinum': 'Platinum Elite',
            'gold': 'Gold Elite',
            'silver': 'Silver Elite',
            'club': 'Club Member',
            'booking': 'Booking.com',
            'expedia': 'Expedia',
            'direct': 'Direct Booking',
            'arrival': 'Arrival',
            'not-reserved': 'Not Reserved'
        };
        
        // Priority order for sorting
        var priorityOrder = {
            'diamond': 1,
            'platinum': 2,
            'booking': 3,
            'gold': 4,
            'silver': 5,
            'club': 6,
            'expedia': 7,
            'direct': 8,
            'arrival': 9,
            'not-reserved': 10
        };
        
        function saveData() {
            var data = { rooms: rooms };
            localStorage.setItem('roomInspectionData', JSON.stringify(data));
        }
        
        function loadData() {
            var data = localStorage.getItem('roomInspectionData');
            if (data) {
                data = JSON.parse(data);
                rooms = data.rooms || [];
                updateRoomsList();
                updatePriorityPreview();
                updateInspectionPreview();
            }
        }
        
        function addRoom() {
            var roomNumber = document.getElementById('roomNumber').value.trim();
            var guestType = document.getElementById('guestType').value;
            var status = document.getElementById('roomStatus').value;
            
            if (!roomNumber) {
                alert('Please enter a room number');
                return;
            }
            
            // Check if room already exists
            if (rooms.find(function(r) { return r.number === roomNumber; })) {
                alert('Room ' + roomNumber + ' is already in the list');
                return;
            }
            
            // Check yesterday inspection history
            var history = JSON.parse(localStorage.getItem('inspectionHistory') || '{}');
            var yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            var yKey = yesterday.getFullYear() + '-' + String(yesterday.getMonth()+1).padStart(2,'0') + '-' + String(yesterday.getDate()).padStart(2,'0');
            var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            var yLabel = yesterday.getDate() + ' ' + monthNames[yesterday.getMonth()];
            if (history[roomNumber] && history[roomNumber] === yKey) {
                var proceed = confirm('⚠️ Room ' + roomNumber + ' was inspected yesterday (' + yLabel + '). Are you sure you want to add it?');
                if (!proceed) return;
            }
            
            rooms.push({
                number: roomNumber,
                guestType: guestType,
                status: status,
                observations: ''
            });
            
            // Sort by priority
            rooms.sort(function(a, b) {
                var priorityDiff = priorityOrder[a.guestType] - priorityOrder[b.guestType];
                if (priorityDiff !== 0) return priorityDiff;
                return parseInt(a.number) - parseInt(b.number);
            });
            
            document.getElementById('roomNumber').value = '';
            updateRoomsList();
            updateInspectionRoomsList();
            updatePriorityPreview();
            updateInspectionPreview();
            saveData();
        }
        
        function removeRoom(roomNumber) {
            rooms = rooms.filter(function(r) { return r.number !== roomNumber; });
            updateRoomsList();
            updateInspectionRoomsList();
            updatePriorityPreview();
            updateInspectionPreview();
            saveData();
        }
        
        function removeAllRooms() {
            if (rooms.length === 0) {
                return;
            }
            
            if (confirm('Are you sure you want to remove all rooms? This cannot be undone.')) {
                rooms = [];
                updateRoomsList();
                updatePriorityPreview();
                updateInspectionPreview();
                saveData();
            }
        }
        
        function toggleInspected(roomNumber) {
            var room = rooms.find(function(r) { return r.number === roomNumber; });
            if (room) {
                room.ticked = !room.ticked;
                if (room.ticked) {
                    // Save to inspection history
                    var history = JSON.parse(localStorage.getItem('inspectionHistory') || '{}');
                    var today = new Date();
                    var todayKey = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
                    history[roomNumber] = todayKey;
                    localStorage.setItem('inspectionHistory', JSON.stringify(history));
                }
                updateRoomsList();
                updateInspectionPreview();
                saveData();
            }
        }

        function updateRoomStatus(roomNumber, newStatus) {
            var room = rooms.find(function(r) { return r.number === roomNumber; });
            if (room) {
                room.status = newStatus;
                updateRoomsList();
                updatePriorityPreview();
                saveData();
            }
        }
        
        function updateRoomGuestType(roomNumber, newType) {
            var room = rooms.find(function(r) { return r.number === roomNumber; });
            if (room) {
                room.guestType = newType;
                
                // Re-sort
                rooms.sort(function(a, b) {
                    var priorityDiff = priorityOrder[a.guestType] - priorityOrder[b.guestType];
                    if (priorityDiff !== 0) return priorityDiff;
                    return parseInt(a.number) - parseInt(b.number);
                });
                
                updateRoomsList();
                updatePriorityPreview();
                updateInspectionPreview();
                saveData();
            }
        }
        
        function updateRoomObservations(roomNumber, observations) {
            var room = rooms.find(function(r) { return r.number === roomNumber; });
            if (room) {
                room.observations = observations;
                updateInspectionPreview();
                saveData();
            }
        }
        
        function updateRoomsCounter() {
            var total = rooms.length;
            var ticked = rooms.filter(function(r) { return r.ticked; }).length;
            var left = total - ticked;
            var counter = document.getElementById('roomsCounter');
            if (total === 0) { counter.style.display = 'none'; return; }
            counter.style.display = 'block';
            var pct = Math.round((ticked / total) * 100);
            counter.innerHTML = 
                '✅ ' + ticked + ' inspected &nbsp;|&nbsp; ⏳ ' + left + ' remaining &nbsp;|&nbsp; ' + pct + '% done' +
                '<div style="margin-top:6px;height:6px;background:#c7d2fe;border-radius:3px;">' +
                  '<div style="height:6px;background:#667eea;border-radius:3px;width:' + pct + '%;transition:width 0.3s;"></div>' +
                '</div>';
        }

                function updateRoomsList() {
            if (rooms.length === 0) {
                document.getElementById('roomsList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><p>No rooms added yet.<br>Add rooms above to get started.</p></div>';
                document.getElementById('roomsCounter').style.display = 'none';
                return;
            }
            
            var html = '<div style="display: flex; flex-direction: column; gap: 10px;">';
            
            rooms.forEach(function(room) {
                var isTicked = room.ticked ? true : false;
                var isDirty = room.status === 'dirty';
                var isClean = room.status === 'clean';
                var cardClass = 'room-card' + (isTicked ? ' ticked-card' : (isDirty ? ' dirty-card' : (isClean ? ' clean-card' : '')));
                html += '<div class="' + cardClass + '">' +
                    '<div class="room-header">' +
                        '<div style="display:flex; align-items:center; gap:10px;">' +
                            '<button class="tick-btn' + (isTicked ? ' ticked' : '') + '" onclick="toggleInspected(\'' + room.number + '\')" title="Mark as inspected">✓</button>' +
                            '<div>' +
                                '<span class="room-number">' + room.number + '</span> ' +
                                '<span class="guest-type ' + room.guestType + '">' + guestTypeNames[room.guestType] + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<button class="btn btn-danger btn-small" onclick="removeRoom(\'' + room.number + '\')">Remove</button>' +
                    '</div>' +
                    '<div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">' +
                        '<select onchange="updateRoomGuestType(\'' + room.number + '\', this.value)" style="flex: 1; min-width: 150px; padding: 8px; border: 2px solid #e0e0e0; border-radius: 8px;">';
                
                Object.keys(guestTypeNames).forEach(function(type) {
                    html += '<option value="' + type + '"' + (room.guestType === type ? ' selected' : '') + '>' + guestTypeNames[type] + '</option>';
                });
                
                html += '</select>' +
                        '<select onchange="updateRoomStatus(\'' + room.number + '\', this.value)" style="flex: 1; min-width: 120px; padding: 8px; border: 2px solid #e0e0e0; border-radius: 8px;">' +
                            '<option value="dirty"' + (room.status === 'dirty' ? ' selected' : '') + '>Dirty</option>' +
                            '<option value="inspected"' + (room.status === 'inspected' ? ' selected' : '') + '>Inspected</option>' +
                            '<option value="clean"' + (room.status === 'clean' ? ' selected' : '') + '>Clean</option>' +
                        '</select>' +
                    '</div>' +
                    '<textarea placeholder="Observations (optional)" ' +
                    'oninput="this.style.height=\'auto\';this.style.height=this.scrollHeight+\'px\';updateRoomObservations(\'' + room.number + '\', this.value)" ' +
                    'style="width:100%;margin-top:10px;padding:8px 10px;border:2px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;resize:none;overflow:hidden;min-height:36px;line-height:1.4;box-sizing:border-box;">' + (room.observations || '') + '</textarea>' +
                    '<div class="photo-section">' +
                        '<div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">' +
                            '<button class="btn-camera" onclick="triggerCamera(\'' + room.number + '\')">📷 Add Photo</button>' +
                            (photoStore[room.number] && photoStore[room.number].length > 0 ? '<button class="btn-wa-photo" onclick="shareRoomPhotos(\'' + room.number + '\')">💬 Share via WhatsApp</button>' : '') +
                            '<input type="file" accept="image/*" capture="environment" id="cam_' + room.number + '" style="display:none" onchange="handlePhoto(\'' + room.number + '\', this)">' +
                        '</div>' +
                        '<div class="photo-grid" id="photos_' + room.number + '">';

                var sessionPhotos = photoStore[room.number] || [];
                if (sessionPhotos.length > 0) {
                    sessionPhotos.forEach(function(photo, idx) {
                        html += '<div class="photo-thumb-wrap">' +
                            '<img src="' + photo.dataUrl + '" alt="Room ' + room.number + '">' +
                            '<button class="photo-thumb-del" onclick="deletePhoto(\'' + room.number + '\',' + idx + ')">✕</button>' +
                            '<button class="photo-thumb-save" onclick="savePhoto(\'' + room.number + '\',' + idx + ')" title="Save to device">↓</button>' +
                        '</div>';
                    });
                }

                html += '</div>' +
                    '</div>' +
                '</div>';
            });
            
            html += '</div>';
            document.getElementById('roomsList').innerHTML = html;
            updateRoomsCounter();
        }
        
        
        function updatePriorityPreview() {
            var message = generatePriorityList();
            document.getElementById('priorityPreview').textContent = message;
        }
        
        function generatePriorityList() {
            if (rooms.length === 0) {
                return 'Add rooms to generate priority list...';
            }
            
            var today = new Date();
            var dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            
            var dirtyRooms = rooms.filter(function(r) { return r.status === 'dirty'; });
            var inspectedRooms = rooms.filter(function(r) { return r.status === 'inspected'; });
            var cleanRooms = rooms.filter(function(r) { return r.status === 'clean'; });
            
            // Sort each group by room number (lowest to highest)
            dirtyRooms.sort(function(a, b) { return parseInt(a.number) - parseInt(b.number); });
            cleanRooms.sort(function(a, b) { return parseInt(a.number) - parseInt(b.number); });
            inspectedRooms.sort(function(a, b) { return parseInt(a.number) - parseInt(b.number); });
            
            var message = '*PRIORITY ROOM LIST*\n';
            message += dateStr + '\n';
            message += '━━━━━━━━━━━━━━━━\n\n';
            
            // Summary
            message += '📊 *SUMMARY*\n';
            message += 'Total: ' + rooms.length + ' rooms\n';
            message += '• Dirty: ' + dirtyRooms.length + '\n';
            message += '• Clean: ' + cleanRooms.length + '\n';
            message += '• Inspected: ' + inspectedRooms.length + '\n\n';
            
            // Dirty Status
            message += '🔴 *DIRTY STATUS*\n';
            if (dirtyRooms.length > 0) {
                dirtyRooms.forEach(function(room) {
                    message += room.number + ' - ' + guestTypeNames[room.guestType] + '\n';
                });
            } else {
                message += '(None)\n';
            }
            message += '\n';
            
            // Clean Status
            message += '🟡 *CLEAN STATUS*\n';
            if (cleanRooms.length > 0) {
                cleanRooms.forEach(function(room) {
                    message += room.number + ' - ' + guestTypeNames[room.guestType] + '\n';
                });
            } else {
                message += '(None)\n';
            }
            message += '\n';
            
            // Inspected Status
            message += '🟢 *INSPECTED STATUS*\n';
            if (inspectedRooms.length > 0) {
                inspectedRooms.forEach(function(room) {
                    message += room.number + ' - ' + guestTypeNames[room.guestType] + '\n';
                });
            } else {
                message += '(None)\n';
            }
            message += '\n━━━━━━━━━━━━━━━━\n';
            message += 'Please update PMS as each room is completed. I will conduct final checks before guest arrivals.';
            
            return message;
        }
        
        function copyPriorityList() {
            var message = generatePriorityList();
            
            if (rooms.length === 0) {
                alert('Please add rooms first');
                return;
            }
            
            var btn = event.target;
            var originalText = btn.textContent;
            
            // Try modern clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(message).then(function() {
                    btn.textContent = '✅ Copied!';
                    btn.style.background = '#38a169';
                    setTimeout(function() {
                        btn.textContent = originalText;
                        btn.style.background = '';
                    }, 2000);
                }).catch(function(err) {
                    copyUsingTextarea(message, btn, originalText);
                });
            } else {
                copyUsingTextarea(message, btn, originalText);
            }
        }
        
        
        function updateInspectionPreview() {
            var message = generateInspectionReport();
            document.getElementById('inspectionPreview').textContent = message;
        }
        
        function generateInspectionReport() {
            var tickedRooms = rooms.filter(function(r) { return r.ticked; });
            
            if (tickedRooms.length === 0) {
                return rooms.length === 0 
                    ? 'Add rooms to generate inspection report...'
                    : 'Tick rooms above (✓) to include them in the report...';
            }
            
            var today = new Date();
            var dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            
            var sortedRooms = tickedRooms.slice().sort(function(a, b) { 
                return parseInt(a.number) - parseInt(b.number); 
            });
            
            var message = '*ROOM INSPECTION REPORT*\n';
            message += dateStr + '\n';
            message += '━━━━━━━━━━━━━━━━\n\n';
            
            message += '📋 *ROOMS INSPECTED:* ' + sortedRooms.length + ' total\n\n';
            
            sortedRooms.forEach(function(room) {
                message += '• Room ' + room.number + ' - ' + guestTypeNames[room.guestType] + '\n';
            });
            message += '\n';
            
            var roomObservations = [];
            sortedRooms.forEach(function(room) {
                if (room.observations && room.observations.trim()) {
                    roomObservations.push('Room ' + room.number + ': ' + room.observations.trim());
                }
            });
            
            if (roomObservations.length > 0) {
                message += '━━━━━━━━━━━━━━━━\n';
                message += '📝 *OBSERVATIONS*\n\n';
                roomObservations.forEach(function(obs) {
                    message += '• ' + obs + '\n';
                });
                message += '\n';
            }
            
            message += '━━━━━━━━━━━━━━━━\n';
            message += '✅ All rooms inspected and ready for guest arrival.';
            
            return message;
        }
        
        function copyInspectionReport() {
            var message = generateInspectionReport();
            
            if (rooms.length === 0) {
                alert('Please add rooms first');
                return;
            }
            
            var btn = event.target;
            var originalText = btn.textContent;
            
            // Try modern clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(message).then(function() {
                    btn.textContent = '✅ Copied!';
                    btn.style.background = '#38a169';
                    setTimeout(function() {
                        btn.textContent = originalText;
                        btn.style.background = '';
                    }, 2000);
                }).catch(function(err) {
                    copyUsingTextarea(message, btn, originalText);
                });
            } else {
                copyUsingTextarea(message, btn, originalText);
            }
        }
        
        function copyUsingTextarea(text, btn, originalText) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.top = '0';
            textarea.style.left = '0';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            
            try {
                var successful = document.execCommand('copy');
                document.body.removeChild(textarea);
                
                if (successful) {
                    btn.textContent = '✅ Copied!';
                    btn.style.background = '#38a169';
                    setTimeout(function() {
                        btn.textContent = originalText;
                        btn.style.background = '';
                    }, 2000);
                } else {
                    alert('Copy failed. Please long-press the preview text below and copy manually.');
                }
            } catch (err) {
                document.body.removeChild(textarea);
                alert('Copy failed. Please long-press the preview text below and copy manually.');
            }
        }
        
        // Event listener for Enter key on room number
        document.getElementById('roomNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addRoom();
            }
        });
        
        function triggerCamera(roomNumber) {
            document.getElementById('cam_' + roomNumber).click();
        }

        // In-memory only photo store — not saved to localStorage
        var photoStore = {};

        function handlePhoto(roomNumber, input) {
            if (!input.files || !input.files[0]) return;
            var file = input.files[0];
            var room = rooms.find(function(r) { return r.number === roomNumber; });
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    // Build stamp text
                    var now = new Date();
                    var day = now.getDate();
                    var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                    var month = monthNames[now.getMonth()];
                    var year = now.getFullYear();
                    var hours = String(now.getHours()).padStart(2, '0');
                    var mins = String(now.getMinutes()).padStart(2, '0');
                    var stampText = 'Room ' + roomNumber + '  |  ' + (room ? guestTypeNames[room.guestType] : '') + '  |  ' + day + ' ' + month + ' ' + year + ' ' + hours + ':' + mins;

                    // Font size relative to image width
                    var fontSize = Math.max(20, Math.round(img.width * 0.035));
                    ctx.font = 'bold ' + fontSize + 'px Arial';

                    var padding = Math.round(fontSize * 0.6);
                    var textMetrics = ctx.measureText(stampText);
                    var textW = textMetrics.width;
                    var textH = fontSize;

                    var x = padding;
                    var y = img.height - padding;

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
                    ctx.beginPath();
                    var rx = x - padding * 0.5;
                    var ry = y - textH - padding * 0.4;
                    var rw = textW + padding;
                    var rh = textH + padding * 0.8;
                    ctx.roundRect(rx, ry, rw, rh, 6);
                    ctx.fill();

                    ctx.fillStyle = 'white';
                    ctx.fillText(stampText, x, y - padding * 0.1);

                    var dataUrl = canvas.toDataURL('image/jpeg', 0.92);

                    // Auto-save to device immediately
                    var pad = function(n) { return String(n).padStart(2,'0'); };
                    var dateStr = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate());
                    var timeStr = pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
                    var filename = 'Room_' + roomNumber + '_' + dateStr + '_' + timeStr + '.jpg';
                    var a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    // Store in memory only for this session (thumbnail display)
                    if (!photoStore[roomNumber]) photoStore[roomNumber] = [];
                    photoStore[roomNumber].push({ dataUrl: dataUrl, filename: filename });

                    updateRoomsList();
                    input.value = '';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function deletePhoto(roomNumber, idx) {
            if (photoStore[roomNumber]) {
                photoStore[roomNumber].splice(idx, 1);
                updateRoomsList();
            }
        }

        function savePhoto(roomNumber, idx) {
            if (!photoStore[roomNumber] || !photoStore[roomNumber][idx]) return;
            var photo = photoStore[roomNumber][idx];
            var a = document.createElement('a');
            a.href = photo.dataUrl;
            a.download = photo.filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function shareRoomPhotos(roomNumber) {
            var photos = photoStore[roomNumber];
            if (!photos || photos.length === 0) return;

            var total = photos.length;
            var current = 0;

            function downloadNext() {
                if (current >= total) {
                    setTimeout(function() {
                        var text = encodeURIComponent('Room ' + roomNumber + ' inspection — ' + total + ' photo(s) attached.');
                        window.open('https://wa.me/?text=' + text, '_blank');
                    }, 800);
                    return;
                }
                var photo = photos[current];
                var a = document.createElement('a');
                a.href = photo.dataUrl;
                a.download = photo.filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                current++;
                setTimeout(downloadNext, 1500);
            }

            downloadNext();
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
